<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عامل گفتگو</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-head">
        <h1>عامل گفتگو</h1>
        <button id="newChatBtn" class="btn-solid">گفتگوی جدید</button>
      </div>
      <div class="section-title">گفتگوها</div>
      <div id="sessionList" class="session-list"></div>
    </aside>

    <main class="chat-main">
      <header class="chat-topbar">
        <div class="mode-switch" id="modeSwitch">
          <button data-mode="chat" class="mode-btn">حالت چت</button>
          <button data-mode="agent" class="mode-btn active">Agent Mode</button>
        </div>
        <div class="top-actions">
          <input id="modelInput" value="gpt-4.1" />
          <span id="healthBadge" class="badge ok">آنلاین</span>
        </div>
      </header>

      <section id="messagePane" class="message-pane">
        <div class="empty-state">یک گفتگو بساز و پیام اول را بفرست.</div>
      </section>

      <section class="composer">
        <div id="attachmentBar" class="attachment-bar"></div>
        <div class="composer-row">
          <label class="upload-btn" for="fileInput">📎 فایل/تصویر</label>
          <input id="fileInput" type="file" multiple hidden />
          <textarea id="messageInput" placeholder="پیام خودت را بنویس..." rows="1"></textarea>
          <button id="sendBtn" class="btn-solid">ارسال</button>
        </div>
      </section>
    </main>

    <aside class="agent-panel">
      <div class="section-title">تاییدهای Agent</div>
      <div id="approvalList" class="approval-list"></div>
      <div class="section-title">آپلودهای اخیر</div>
      <div id="uploadList" class="upload-list"></div>
    </aside>
  </div>

  <template id="sessionItemTpl">
    <button class="session-item">
      <strong></strong>
      <small></small>
    </button>
  </template>

  <template id="messageTpl">
    <article class="msg">
      <div class="msg-role"></div>
      <div class="msg-content"></div>
      <div class="msg-meta"></div>
    </article>
  </template>

  <template id="approvalTpl">
    <article class="approval-item">
      <div class="approval-title"></div>
      <pre class="approval-args"></pre>
      <div class="approval-actions">
        <button class="btn-ok">تایید</button>
        <button class="btn-no">رد</button>
      </div>
    </article>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
