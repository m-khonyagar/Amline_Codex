user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip for static files
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/pdf;
    gzip_min_length 256;

    server {
        listen 80;
        listen [::]:80;

        server_name amline.ir www.amline.ir;

        # ---------------------------
        # Android app redirect
        # ---------------------------
        if ($arg_client = "android-app") {
            return 301 https://app.amline.ir$request_uri;
        }

        # ---------------------------
        # Redirect all contract inquiries to app
        # ---------------------------
        location ~ ^/contracts/inquiry/[^/]+/[^/]+/?$ {
            return 301 https://app.amline.ir$request_uri;
        }
        
        location = /favicon.ico { 
            root /usr/share/nginx/html;
            access_log off; 
            log_not_found off; 
        }
        location = /robots.txt { 
            root /usr/share/nginx/html;
            access_log off; 
            log_not_found off; 
        }
        location = /sitemap.xml { 
            root /usr/share/nginx/html;
            access_log off; 
            log_not_found off; 
        }

        # ---------------------------
        # Next.js _next assets
        # ---------------------------
        location /_next/ {
            root /usr/share/nginx/html;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ---------------------------
        # ACME challenge
        # ---------------------------
        location ^~ /.well-known/acme-challenge/ {
            try_files $uri =404;
        }

        # ---------------------------
        # WordPress under /blog
        # ---------------------------

        # PHP files: strip /blog prefix
        location ~ ^/blog/(.*\.php)$ {
            include fastcgi_params;
            fastcgi_pass blog-wp.amline-production.svc:9000;
            fastcgi_index index.php;

            fastcgi_param SCRIPT_FILENAME /var/www/html/$1;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param QUERY_STRING $query_string;
        }

        # Static assets via PHP-FPM (Option A)
        location ~* ^/blog/(.*\.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|pdf))$ {
            fastcgi_pass blog-wp.amline-production.svc:9000;
            include fastcgi_params;

            fastcgi_param SCRIPT_FILENAME /var/www/html/static.php;
            fastcgi_param QUERY_STRING "file=/$1";
        }

        # Pretty permalinks / fallback for non-PHP WordPress requests
        location /blog/ {
            include fastcgi_params;
            fastcgi_pass blog-wp.amline-production.svc:9000;
            fastcgi_index index.php;

            fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
            fastcgi_param QUERY_STRING $query_string;
        }

        # ---------------------------
        # Next.js root (catch-all) with pretty URLs
        # ---------------------------
        # Serve 404.html with proper HTTP 404
        error_page 404 /404.html;

        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;

            # Try exact URI, then URI/ (folder/index.html), then URI.html, else 404
            try_files $uri $uri/ $uri.html =404;
        }

        # ---------------------------
        # Deny access to hidden files
        # ---------------------------
        location ~ /\. {
            deny all;
        }

        # ---------------------------
        # Optional: limit upload size
        # ---------------------------
        client_max_body_size 100M;
    }
}
