jobs:
  darkube_build_amline-admin_amline-production_hamravesh-c13:
    container:
      image: hamravesh/darkube-cli:v1.1
      options: --user root
    env:
      IMAGE_NAME: registry.hamdocker.ir/amline/amline-admin
      VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE }}
      VITE_USER_CLIENT_APP_URL: ${{ vars.VITE_USER_CLIENT_APP_URL }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_ACCESS_TOKEN_KEY: ${{ vars.VITE_ACCESS_TOKEN_KEY }}
      VITE_REFRESH_TOKEN_KEY: ${{ vars.VITE_REFRESH_TOKEN_KEY }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout commit
        uses: actions/checkout@v4
      - name: darkube-cli build & push
        run: 'darkube build --push -t $IMAGE_NAME:${GITHUB_SHA:0:7} -t $IMAGE_NAME:${GITHUB_REF_NAME} --docker-auth-config ${{secrets.DOCKER_AUTH_CONFIG}} --workdir . --file ./Dockerfile --build-context .  --build-arg VITE_APP_TITLE   --build-arg VITE_USER_CLIENT_APP_URL   --build-arg VITE_API_BASE_URL   --build-arg VITE_ACCESS_TOKEN_KEY   --build-arg VITE_REFRESH_TOKEN_KEY '
  darkube_deploy_amline-admin_amline-production_hamravesh-c13:
    container: hamravesh/darkube-cli:v1.1
    needs: darkube_build_amline-admin_amline-production_hamravesh-c13
    runs-on: ubuntu-latest
    steps:
      - name: darkube-cli deploy
        run: darkube deploy --token ${{secrets.DEPLOY_TOKEN_AMLINE_ADMIN_AMLINE_PRODUCTION_HAMRAVESH_C13}} --app-id ${{secrets.APP_ID_AMLINE_ADMIN_AMLINE_PRODUCTION_HAMRAVESH_C13}} --image-tag ${GITHUB_SHA:0:7} --job-id ${GITHUB_RUN_ID}
on:
  push:
    tags:
      - 'v*'
